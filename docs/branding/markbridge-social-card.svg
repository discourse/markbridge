<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" fill="none" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#070a12"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#F59E0B" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <symbol id="mb" viewBox="0 0 128 128">
      <rect x="4" y="4" width="120" height="120" rx="24" fill="#1F2937"/>
      <path d="M42 28 H22 V100 H42" stroke="#F59E0B" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <path d="M86 28 H106 V100 H86" stroke="#10B981" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <path d="M46 88 V48 Q64 88 82 48 V88" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </symbol>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <circle cx="320" cy="320" r="320" fill="url(#glow)"/>

  <!-- Icon (carries the brackets visually) -->
  <g transform="translate(180, 180)">
    <use href="#mb" width="280" height="280"/>
  </g>

  <!-- Plain wordmark — no brackets, icon does that work -->
  <text x="540" y="310" font-size="100" font-weight="800" letter-spacing="-2" fill="#e7ecf3" dominant-baseline="central">markbridge</text>

  <!-- General tagline -->
  <text x="540" y="394" font-size="24" fill="#94a3b8" font-weight="500" letter-spacing="0.2">Markup → Discourse Markdown</text>
</svg>
