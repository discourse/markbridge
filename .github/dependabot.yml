version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "DEPS"

  - package-ecosystem: bundler
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "DEPS"
    versioning-strategy: lockfile-only
    allow:
      - dependency-type: direct
      - dependency-type: indirect