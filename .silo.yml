# silo project configuration
# https://github.com/gschlager/silo#project-configuration

image: fedora/44

# Installs rv (MRI) and ruby-install (jruby/truffleruby), the listed Ruby
# versions, pins the default, and wires up the shell. Replaces the manual
# toolchain setup we used to copy-paste here.
use:
  ruby:
    versions: [3.3, 3.4, "4.0", jruby]
    default: "4.0"
  node:

setup:
  - sudo dnf update -y
  - bundle install
  - bundle exec lefthook install -f
  - (cd docs && CI=true pnpm install)

sync:
  - bundle install
  - (cd docs && CI=true pnpm install)

update:
  - sudo dnf update -y
  - rv selfupdate

daemons:
  playground:
    cmd: bin/playground
    ports: ["4567"]
    autostart: true
  docs:
    cmd: bin/docs
    ports: ["4321"]
    autostart: true
