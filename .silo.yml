# silo project configuration
# https://github.com/gschlager/silo#project-configuration

image: fedora/43

setup:
  - sudo dnf install -y gcc make libyaml-devel java-latest-openjdk-headless
  - sudo dnf copr enable -y gschlager/ruby
  - sudo dnf install -y ruby-install
  - curl -LsSf https://rv.dev/install | sh
  - rv ruby install 3.3
  - rv ruby install 3.4
  - rv ruby install 4.0
  - ruby-install jruby
  - bundle install
  - bundle exec lefthook install

sync:
  - bundle install

update:
  - sudo dnf update -y

ports:
  - 4567:4567

daemons:
  playground:
    cmd: bin/playground
    autostart: false
