usage: opensource

integration:
  name: rspec

requires:
  - markbridge/all

includes:
  - lib

matcher:
  subjects:
    - "Markbridge*"

mutation:
  ignore_patterns:
    # String.new(capacity:, encoding:) calls are preallocation hints —
    # capacity is a tuning knob with no observable effect on output, and
    # encoding is restored downstream via force_encoding. Mutations on
    # the kwargs (e.g. /4 → *4, drop encoding) are perf-only equivalents.
    # Survived after removing test-only-subclass publicize specs.
    - "send{selector=new receiver=const{name=String}}"

    # Fast-path / pass-through guards in MarkdownEscaper private helpers.
    # Each of these is an `if REGEX.match?(content)` whose fallthrough
    # path (inline escaping) produces byte-identical output for the same
    # inputs, so mutations on the guard can't be killed through the
    # public #escape API. The only observable difference is allocation
    # count on the fast-path (identity preservation), which we could
    # only test by reaching into private methods. Tried and rejected
    # per project policy. The pattern ignores the surrounding `if` when
    # its condition is a send to the named regex constant.
    - "if{condition=send{receiver=const{name=INLINE_SPECIAL}}}"
    - "if{condition=send{receiver=const{name=THEMATIC_BREAK_STAR}}}"
    - "if{condition=send{receiver=const{name=THEMATIC_BREAK_UNDERSCORE}}}"
    - "if{condition=send{receiver=const{name=FENCED_CODE_BACKTICK}}}"
    - "if{condition=send{receiver=const{name=FENCED_CODE_TILDE}}}"
    - "if{condition=send{receiver=const{name=BULLET_LIST}}}"

    # escape_block_dash's thematic-or-setext check uses a compound
    # `|| (prev && setext.match?)` condition. Same equivalence as the
    # single-regex fast-paths above (inline escapes dashes identically
    # when the block fallthrough fires).
    - "if{condition=or{left=send{receiver=const{name=THEMATIC_BREAK_DASH}}}}"

    # Single-line fast-paths: `return ... if lines.size == 1` appears in
    # both MarkdownEscaper#escape_text and ListItemBuilder#build. In both
    # cases the main-loop path produces byte-identical output for single-
    # line input, so mutations on the guard / the `lines[0]` arg / the
    # split limit all survive. Tried: identity tests through #escape —
    # fails because split + result-buffer always allocate anyway, so
    # fast-path-taken vs main-loop-run-once outputs differ only by
    # object identity *inside* escape_text, which isn't observable from
    # outside without reaching a private method.
    #
    # Pattern matches `if X.<anything>.<anything>` where X is a local
    # variable named `lines`. Both call sites use that exact shape.
    - "if{condition=send{receiver=send{receiver=lvar{value=lines}}}}"

    # escape_line's `while indent_len < 3` bound. Mutations to the
    # bound (<4, <167, etc.) are equivalent because the upstream
    # INDENTED_CODE filter guarantees indent_len can never reach 4.
    # Mutations dropping the bound entirely (`while indent_len` or
    # `while 3`) rely on the inner `break if getbyte != SPACE` to
    # terminate — same effective behavior for valid input.
    - "while{condition=send{receiver=lvar{value=indent_len}}}"

    # escape_line's `has_indent = indent_len > 0` and subsequent
    # `if has_indent` branching. Mutations alter which side of the
    # ternary is taken, which changes object identity (line vs
    # line[indent_len..]) but not output bytes. Only observable via
    # private-method identity testing.
    - "lvasgn{name=has_indent}"
    - "if{condition=lvar{value=has_indent}}"

    # Nested `line.X.Y` sends in escape_line / paragraph_line?:
    #   line.getbyte(indent_len).nil?
    #   line.getbyte(indent_len) != SPACE
    #   line.getbyte(first_non_space).nil?
    # The guard mutations (== vs .eql? vs .equal?, drop-guard, etc.)
    # are equivalent because getbyte returns nil past the end and
    # Integer equality is the same for Fixnum. Fall-through paths
    # produce identical output.
    - "if{condition=send{receiver=send{receiver=lvar{value=line}}}}"

    # Allocation-saving ternary `content = <cond> ? line[N..] : line`
    # in escape_line and paragraph_line?. Mutations flip the ternary
    # so the indent-prefix slice always fires (line[0..] produces a
    # new string with equal content). Output bytes identical; only
    # object identity differs, which is an internal contract.
    - "lvasgn{name=content value=if}"

    # escape_block_level's `case first_byte` dispatch. Mutations on
    # `when` conditions (`when STAR` → `when nil`, etc.) make the
    # branch unreachable. The fallthrough `[content, false]` + inline
    # escaping produces byte-identical output for STAR/UNDERSCORE/
    # BACKTICK/TILDE/BRACKET_OPEN/PIPE inputs because inline escape
    # wraps the same characters. Return-statement mutations inside
    # those branches (e.g. `return escape_block_star(content)` →
    # `nil`) have the same equivalence. block_construct?'s
    # `case content.getbyte(0)` is already at 97% and unaffected.
    - "case{value=lvar{value=first_byte}}"
